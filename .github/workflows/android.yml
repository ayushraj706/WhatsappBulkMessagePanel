name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      # API folder hatao taaki static build fail na ho
      - name: Next.js Build
        run: |
          rm -rf app/api 
          npm run build
        env:
          IS_ANDROID_BUILD: true

      - name: Ensure Out Directory
        run: |
          mkdir -p out
          touch out/index.html

      # AUTO-FIX LOGIC: Broken android folder ko theek karega
      - name: Capacitor Sync & Repair
        run: |
          # 1. Google Config ka backup lo agar exist karti hai
          if [ -f android/app/google-services.json ]; then
            cp android/app/google-services.json ./google-services-temp.json
          fi
          
          # 2. Purana tuta hua android folder delete karo
          rm -rf android
          
          # 3. Fresh Android Platform add karo (Isse 'gradlew' ban jayega)
          npx cap add android
          
          # 4. Google Config wapas sahi jagah rakho
          if [ -f ./google-services-temp.json ]; then
            mkdir -p android/app
            mv ./google-services-temp.json android/app/google-services.json
          fi
          
          # 5. Sync karo
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BaseKey-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
